<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BBB Sapiens🦍</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #fff; text-align: center; }
    h1 { margin: 20px 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 20px; padding: 20px; }
    .card { position: relative; border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
    .card:hover { transform: scale(1.05); }
    .card img { width: 100%; height: 180px; object-fit: contain; background: #000; }
    .name { padding: 5px; font-size: 14px; }
    .eliminated img { filter: grayscale(100%); opacity: 0.6; }
    .badge { position: absolute; top: 5px; right: 5px; font-size: 20px; }
    .vip { position: absolute; bottom: 5px; right: 5px; font-size: 18px; }
    .percent { position: absolute; bottom: 5px; left: 5px; font-size: 14px; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 6px; }
    .info-box { background: #1e1e1e; border-radius: 12px; padding: 15px; margin: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    .controls { margin-top: 20px; }
    button { margin: 5px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; }
    select { padding: 8px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>BBB Sapiens🦍</h1>

  <div class="info-box">
    <h2>📢 Regras da Casa</h2>
    <p><strong>🥀 Xepa:</strong> não pode tomar café nem comer misto</p>
    <p><strong>💰 VIP:</strong> pode comer e beber à vontade</p>
  </div>

  <div class="controls">
    <select id="playerSelect"></select>
    <button onclick="toggleEliminated()">Eliminar</button>
    <button onclick="setLeader()">👑 Líder</button>
    <button onclick="setMonster()">👹 Monstro</button>
    <button onclick="setAngel()">😇 Anjo</button>
    <button onclick="setVip()">💰 VIP</button>
    <button onclick="setXepa()">🥀 Xepa</button>
    <button onclick="setPercent()">📊 % Eliminação</button>
    <button onclick="clearBadges()">Limpar Status</button>
  </div>

  <div class="grid" id="grid"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAVkCHEMPXAEH3OJitQX2CGXVJrTHLgBgA",
      authDomain: "bbb-sapiens.firebaseapp.com",
      projectId: "bbb-sapiens",
      storageBucket: "bbb-sapiens.firebasestorage.app",
      messagingSenderId: "503080421886",
      appId: "1:503080421886:web:bb69247fe44cf79c0b18af",
      measurementId: "G-V33EY56GTM"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const players = [
      { name: "Teteu", img: "teteu.jpg" },
      { name: "Duda", img: "duda.jpg" },
      { name: "Lukinhas", img: "lukinhas.jpg" },
      { name: "Luka", img: "luka.jpg" },
      { name: "Jhon Bets", img: "jhon bets.jpg" },
      { name: "Patrick", img: "patrick.jpg" },
      { name: "Dudu", img: "dudu.jpg" },
      { name: "Eric", img: "eric.jpg" },
      { name: "Léo", img: "leo.jpg" },
      { name: "Josué", img: "josue.jpg" }
    ];

    const grid = document.getElementById("grid");
    const select = document.getElementById("playerSelect");

    players.forEach((p, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = p.name;
      select.appendChild(option);

      const card = document.createElement("div");
      card.className = "card";
      card.id = "player-" + index;

      card.innerHTML = "<img src='" + p.img + "' />" +
        "<div class='name'>" + p.name + "</div>" +
        "<div class='badge' id='badge-" + index + "'></div>" +
        "<div class='vip' id='vip-" + index + "'></div>" +
        "<div class='percent' id='percent-" + index + "'></div>";

      grid.appendChild(card);
    });

    function getSelectedIndex() { return parseInt(select.value); }

    function saveState(index, data) {
      db.collection("players").doc(String(index)).set(data, { merge: true });
    }

    function listenUpdates() {
      db.collection("players").onSnapshot((snapshot) => {
        players.forEach((_, i) => {
          document.getElementById("badge-"+i).textContent = "";
          document.getElementById("vip-"+i).textContent = "";
          document.getElementById("percent-"+i).textContent = "";
          document.getElementById("player-"+i).classList.remove("eliminated");
        });

        snapshot.forEach((doc) => {
          const i = doc.id;
          const d = doc.data();

          if (d.leader) document.getElementById("badge-"+i).textContent += " 👑";
          if (d.monster) document.getElementById("badge-"+i).textContent += " 👹";
          if (d.angel) document.getElementById("badge-"+i).textContent += " 😇";
          if (d.vip) document.getElementById("vip-"+i).textContent = "💰";
          if (d.xepa) document.getElementById("vip-"+i).textContent = "🥀";
          if (d.percent) document.getElementById("percent-"+i).textContent = d.percent;
          if (d.eliminated) document.getElementById("player-"+i).classList.add("eliminated");
        });
      });
    }

    listenUpdates();

    function toggleEliminated() {
      const i = getSelectedIndex();
      const el = document.getElementById("player-"+i);
      el.classList.toggle("eliminated");
      saveState(i, { eliminated: el.classList.contains("eliminated") });
    }

    function setLeader() {
      const index = getSelectedIndex();
      const badge = document.getElementById("badge-" + index);
      const isLeader = badge.textContent.includes("👑");

      if (isLeader) {
        saveState(index, { leader: false });
      } else {
        players.forEach((_, i) => saveState(i, { leader: false }));
        saveState(index, { leader: true });
      }
    }

    function setMonster() {
      const index = getSelectedIndex();
      const badge = document.getElementById("badge-" + index);
      const has = badge.textContent.includes("👹");
      saveState(index, { monster: !has });
    }

    function setAngel() {
      const index = getSelectedIndex();
      const badge = document.getElementById("badge-" + index);
      const has = badge.textContent.includes("😇");
      saveState(index, { angel: !has });
    }

    function setVip() {
      const index = getSelectedIndex();
      const el = document.getElementById("vip-" + index);
      const isVip = el.textContent === "💰";

      if (isVip) {
        saveState(index, { vip: false });
      } else {
        saveState(index, { vip: true, xepa: false });
      }
    }

    function setXepa() {
      const index = getSelectedIndex();
      const el = document.getElementById("vip-" + index);
      const isXepa = el.textContent === "🥀";

      if (isXepa) {
        saveState(index, { xepa: false });
      } else {
        saveState(index, { xepa: true, vip: false });
      }
    }

    function clearBadges() {
      players.forEach((_, i) => {
        saveState(i, { leader:false, monster:false, angel:false, vip:false, xepa:false, percent:"", eliminated:false });
      });
    }

    function setPercent() {
      const value = prompt("Digite a porcentagem (ex: 87 ou 87%)");
      if (value) {
        const formatted = value.includes("%") ? value : value+"%";
        saveState(getSelectedIndex(), { percent: formatted });
      }
    }
  </script>
</body>
</html>
